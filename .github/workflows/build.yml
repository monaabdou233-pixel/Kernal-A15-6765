name: Build Oppo A15 Kernel

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ubuntu:20.04
    steps:
    - name: Checkout Source
      uses: actions/checkout@v4
      with:
        fetch-depth: 1

    - name: Install Build Packages
      run: |
        export DEBIAN_FRONTEND=noninteractive
        apt-get update
        apt-get install -y \
          python2 python-is-python2 git ccache automake flex lzop bison gperf \
          build-essential zip curl zlib1g-dev g++-multilib libxml2-utils bzip2 \
          libbz2-dev libghc-bzlib-dev squashfs-tools pngcrush fontconfig \
          liblz4-tool make optipng maven libssl-dev pwgen bc libc6-dev-i386 \
          libx11-dev lib32z-dev libgl1-mesa-dev xsltproc unzip \
          device-tree-compiler libncurses5 libtinfo5 wget

    - name: Download Toolchains
      run: |
        mkdir -p tools
        
        echo "==> Cloning Clang 6.0.2... <=="
        git clone https://github.com/KAGA-KOKO/clang-6.0.2 -b clang --depth=1 tools/clang
        
        echo "==> Cloning GCC 64-bit... <=="
        git clone https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9 -b ndk-release-r16 --depth=1 tools/gcc64
        
        echo "==> Cloning GCC 32-bit... <=="
        git clone https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/arm/arm-linux-androideabi-4.9 -b ndk-release-r16 --depth=1 tools/gcc32

    - name: Build Kernel
      run: |
        # Fix git ownership security warnings inside Docker containers
        git config --global --add safe.directory "$GITHUB_WORKSPACE"
        
        cd kernel-4.9
        
        # Absolute path mapping to your newly set up tools folder
        TOOLS_DIR=$GITHUB_WORKSPACE/tools
        export PATH="${TOOLS_DIR}/clang/bin:${TOOLS_DIR}/gcc64/bin:${TOOLS_DIR}/gcc32/bin:/usr/bin:/bin"
        
        # Kernel Architecture Environment flags
        export ARCH=arm64
        export SUBARCH=arm64
        PROCS=$(nproc --all)
        
        echo "==> Configuring with oppo6765_defconfig <=="
        make O=out ARCH=arm64 CC=clang HOSTCC=clang DTC=dtc \
          CLANG_TRIPLE=aarch64-linux-gnu- \
          CROSS_COMPILE=aarch64-linux-androidkernel- \
          oppo6765_defconfig
        
        echo "==> Starting Kernel Compilation <=="
        make -j${PROCS} O=out ARCH=arm64 CC=clang HOSTCC=clang DTC=dtc \
          CLANG_TRIPLE=aarch64-linux-gnu- \
          CROSS_COMPILE=aarch64-linux-androidkernel-

    - name: Check for Kernel Output
      run: |
        cd kernel-4.9
        if [ -f out/arch/arm64/boot/Image.gz-dtb ]; then
          echo "Kernel compiled successfully!"
          mkdir -p $GITHUB_WORKSPACE/output
          cp out/arch/arm64/boot/Image.gz-dtb $GITHUB_WORKSPACE/output/Image.gz-dtb
        elif [ -f out/arch/arm64/boot/Image.gz ]; then
          echo "Kernel compiled successfully (Image.gz format)!"
          mkdir -p $GITHUB_WORKSPACE/output
          cp out/arch/arm64/boot/Image.gz $GITHUB_WORKSPACE/output/Image.gz
        else
          echo "Error: Target kernel image not found. Compilation layout failed."
          exit 1
        fi

    - name: Upload Kernel Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Oppo-A15-Kernel-CustomClang
        path: output/*
