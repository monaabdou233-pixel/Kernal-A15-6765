name: Build Oppo A15 Kernel

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ubuntu:20.04
    steps:
    - name: Checkout Kernel Source
      uses: actions/checkout@v4
      with:
        fetch-depth: 1

    - name: Install Build Dependencies
      run: |
        # Prevent interactive prompts from blocking apt updates
        export DEBIAN_FRONTEND=noninteractive
        apt-get update
        apt-get install -y bc build-essential libssl-dev \
          bison flex libelf-dev ccache lz4 libncurses5-dev libncurses5 \
          git zip libffi-dev libtinfo5 curl
          
    - name: Download AOSP Clang and GCC Toolchains
      run: |
        mkdir -p toolchain/clang toolchain/x64 toolchain/x32
        
        echo "==> Downloading AOSP Clang 4691093... <=="
        curl -sLO "https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/tags/android-9.0.0_r3/clang-4691093.tar.gz"
        tar -xzf clang-4691093.tar.gz -C toolchain/clang
        rm clang-4691093.tar.gz

        echo "==> Cloning AOSP GCC 64-bit... <=="
        git clone --depth=1 -b master-kernel-build-2021 https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9 toolchain/x64

        echo "==> Cloning AOSP GCC 32-bit... <=="
        git clone --depth=1 -b master-kernel-build-2021 https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/arm/arm-linux-androideabi-4.9 toolchain/x32

    - name: Build Kernel
      run: |
        # Safe directory flag for git within Docker environments
        git config --global --add safe.directory "$GITHUB_WORKSPACE"
        
        cd kernel-4.9
        
        # Absolute path tracking for the toolchains
        WORK=$GITHUB_WORKSPACE/toolchain
        export PATH="${WORK}/clang/bin:${WORK}/x64/bin:${WORK}/x32/bin:/usr/bin:/bin"
        
        # Build Environment Configuration
        export ARCH=arm64
        export SUBARCH=arm64
        PROCS=$(nproc --all)
        
        echo "==> Configuring with oppo6765_defconfig <=="
        make O=out ARCH=arm64 CC=clang HOSTCC=clang DTC=dtc \
          CLANG_TRIPLE=aarch64-linux-gnu- \
          CROSS_COMPILE=aarch64-linux-androidkernel- \
          oppo6765_defconfig
        
        echo "==> Starting Kernel Compilation <=="
        make -j${PROCS} O=out ARCH=arm64 CC=clang HOSTCC=clang DTC=dtc \
          CLANG_TRIPLE=aarch64-linux-gnu- \
          CROSS_COMPILE=aarch64-linux-androidkernel-

    - name: Check for Kernel Output
      run: |
        cd kernel-4.9
        if [ -f out/arch/arm64/boot/Image.gz-dtb ]; then
          echo "Kernel compiled successfully!"
          mkdir -p $GITHUB_WORKSPACE/output
          cp out/arch/arm64/boot/Image.gz-dtb $GITHUB_WORKSPACE/output/Image.gz-dtb
        elif [ -f out/arch/arm64/boot/Image.gz ]; then
          echo "Kernel compiled successfully (Image.gz format)!"
          mkdir -p $GITHUB_WORKSPACE/output
          cp out/arch/arm64/boot/Image.gz $GITHUB_WORKSPACE/output/Image.gz
        else
          echo "Error: Output target image not found. Build failed."
          exit 1
        fi

    - name: Upload Kernel Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Oppo-A15-Kernel-AOSP
        path: output/*
