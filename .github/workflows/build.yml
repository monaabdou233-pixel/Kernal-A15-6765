name: Build Oppo A15 Kernel

on:
  workflow_dispatch: # Allows you to manually trigger the build from GitHub Actions tab

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Kernel Source
      uses: actions/checkout@v4
      with:
        submodules: 'recursive'
        fetch-depth: 1

    - name: Install Build Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y bc build-essential libssl-dev libcrypto++-dev \
          bison flex libelf-dev ccache lz4 libncurses5-dev libncurses5 \
          git zip libffi-dev aarch64-linux-gnu-gcc

    - name: Download Proton Clang Toolchain
      run: |
        mkdir toolchain
        cd toolchain
        # Using Proton Clang 13 (highly stable for kernel 4.9 MTK builds)
        git clone --depth=1 https://github.com/kdrag0n/proton-clang.git clang

    - name: Build Kernel
      run: |
        # Step into your kernel source folder
        cd kernel-4.9
        
        # Setup Environment Paths
        export PATH="$GITHUB_WORKSPACE/toolchain/clang/bin:$PATH"
        
        # Build variables
        export ARCH=arm64
        export SUBARCH=arm64
        export HEADER_ARCH=arm64
        export CROSS_COMPILE=aarch64-linux-gnu-
        export CROSS_COMPILE_ARM32=arm-linux-gnueabi-
        export CC=clang
        
        # Speed up build using available cores
        PROCS=$(nproc --all)
        
        echo "==> Configuring with oppo6765_defconfig <=="
        make O=out ARCH=arm64 oppo6765_defconfig
        
        echo "==> Starting Compilation <=="
        make -j${PROCS} O=out \
          ARCH=arm64 \
          CC=clang \
          CROSS_COMPILE=aarch64-linux-gnu- \
          CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
          AR=llvm-ar \
          NM=llvm-nm \
          OBJCOPY=llvm-objcopy \
          OBJDUMP=llvm-objdump \
          STRIP=llvm-strip

    - name: Check for Kernel Output
      run: |
        cd kernel-4.9
        if [ -f out/arch/arm64/boot/Image.gz-dtb ]; then
          echo "Kernel compiled successfully!"
          mkdir -p $GITHUB_WORKSPACE/output
          cp out/arch/arm64/boot/Image.gz-dtb $GITHUB_WORKSPACE/output/Image.gz-dtb
        elif [ -f out/arch/arm64/boot/Image.gz ]; then
          echo "Kernel compiled successfully (Image.gz format)!"
          mkdir -p $GITHUB_WORKSPACE/output
          cp out/arch/arm64/boot/Image.gz $GITHUB_WORKSPACE/output/Image.gz
        else
          echo "Error: Kernel build failed. Output target image not found."
          exit 1
        fi

    - name: Upload Kernel Artifact
      uses: actions/artifacts-upload@v4
      with:
        name: Oppo-A15-Kernel-Build
        path: output/*

